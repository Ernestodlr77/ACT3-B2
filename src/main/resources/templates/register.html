<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
        .card-neu { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .form-control { border-radius: 12px; padding: 0.7rem; border: 1px solid #cbd5e1; background: #f8fafc; }
        .btn-indigo { background: #6366f1; color: white; border-radius: 12px; padding: 0.7rem; font-weight: 500; border: none; }
        .btn-indigo:hover { background: #4f46e5; }
    </style>
</head>
<body>
<div class="card-neu">
    <h3 class="fw-bold text-dark text-center mb-1">Registrar Operador</h3>
    <p class="text-muted text-center small mb-4">Crea un perfil de acceso comercial</p>

    <div id="mensaje" class="alert d-none small p-2 text-center"></div>

    <form id="formRegistro" class="row g-3">
        <div class="col-6"><input type="text" id="nombre" class="form-control" placeholder="Nombre" required></div>
        <div class="col-6"><input type="text" id="apellido" class="form-control" placeholder="Apellido" required></div>
        <div class="col-12"><input type="text" id="username" class="form-control" placeholder="Nombre de usuario" required minlength="3"></div>
        <div class="col-12"><input type="password" id="password" class="form-control" placeholder="Contraseña de acceso" required minlength="6"></div>
        <div class="col-12 mt-4"><button type="submit" class="btn btn-indigo w-100">Crear Cuenta</button></div>
    </form>
    <div class="text-center mt-3"><a href="/login" class="text-muted small text-decoration-none">¿Posees credenciales? Autentícate</a></div>
</div>

<script>
    document.getElementById('formRegistro').addEventListener('submit', async e => {
        e.preventDefault();
        const msg = document.getElementById('mensaje');
        msg.classList.add('d-none');
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nombre: document.getElementById('nombre').value,
                    apellido: document.getElementById('apellido').value,
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            msg.textContent = data.message || (res.ok ? 'Registro exitoso' : 'Fallo');
            msg.className = 'alert ' + (res.ok ? 'alert-success' : 'alert-danger');
            msg.classList.remove('d-none');
            if (res.ok) setTimeout(() => location.href = '/login', 1200);
        } catch {
            msg.textContent = 'Error crítico del servidor';
            msg.className = 'alert alert-danger';
            msg.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
