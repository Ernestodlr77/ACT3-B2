<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --card: #fff; --text: #1a1a1a; --text-muted: #4a4a4a; --border: #e8e6e1; --accent: #1a1a1a; }
        body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); }
        .navbar { background: var(--card); border-bottom: 1px solid var(--border); }
        .container { max-width: 1200px; padding: 2rem 1rem; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn-primary { background: var(--accent); border: none; }
        .btn-primary:hover { background: #333; }
        .btn-warning { background: #f59e0b; border: none; color: white; }
        .btn-danger { background: #dc2626; border: none; color: white; }
        .badge-success { background: #10b981; }
        .badge-danger { background: #dc2626; }
        .table th { background: #f5f5f4; font-weight: 600; }
        .modal-content { border-radius: 12px; border: none; }
        .form-control { border-radius: 8px; border: 1px solid var(--border); }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,26,26,0.1); }
        .form-select { border-radius: 8px; border: 1px solid var(--border); }
        .detalle-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🛒 Gestión de Ventas</span>
        <a href="/home" class="btn btn-sm btn-outline-secondary">Volver al Inicio</a>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">Lista de Ventas</h4>
            <button class="btn btn-primary" onclick="abrirModal()">+ Nueva Venta</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVenta" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Nueva Venta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formVenta">
                <div class="modal-body">
                    <input type="hidden" id="codigoVenta">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cliente</label>
                            <select class="form-select" id="cliente" required>
                                <option value="">Seleccione un cliente</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fechaVenta" required>
                        </div>
                    </div>

                    <hr>
                    <h6>Productos</h6>
                    <div id="detalleVentas"></div>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="agregarProducto()">+ Agregar Producto</button>

                    <div class="mt-3">
                        <strong>Total: Q <span id="totalVenta">0.00</span></strong>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Venta</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_VENTAS = '/api/ventas';
    const API_CLIENTES = '/api/clientes';
    const API_PRODUCTOS = '/api/productos';
    let modal;
    let productosData = [];
    let clientesData = [];

    document.addEventListener('DOMContentLoaded', async () => {
        modal = new bootstrap.Modal(document.getElementById('modalVenta'));
        await cargarClientes();
        await cargarProductos();
        cargarVentas();
    });

    async function cargarVentas() {
        const res = await fetch(API_VENTAS);
        const datos = await res.json();
        const tbody = document.getElementById('tablaVentas');
        tbody.innerHTML = datos.map(v => `
                <tr>
                    <td>${v.codigoVenta}</td>
                    <td>${v.fechaVenta}</td>
                    <td>${v.cliente?.nombreCliente || 'N/A'}</td>
                    <td>Q ${v.total}</td>
                    <td><span class="badge ${v.estado === 1 ? 'badge-success' : 'badge-danger'}">${v.estado === 1 ? 'Activa' : 'Inactiva'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="verDetalle(${v.codigoVenta})">Ver</button>
                        <button class="btn btn-sm btn-danger" onclick="eliminar(${v.codigoVenta})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
    }

    async function cargarClientes() {
        const res = await fetch(API_CLIENTES);
        clientesData = await res.json();
        const select = document.getElementById('cliente');
        select.innerHTML = '<option value="">Seleccione un cliente</option>' +
            clientesData.map(c => `<option value="${c.dpiCliente}">${c.nombreCliente} ${c.apellidoCliente}</option>`).join('');
    }

    async function cargarProductos() {
        const res = await fetch(API_PRODUCTOS);
        productosData = await res.json();
    }

    function abrirModal() {
        document.getElementById('modalTitulo').textContent = 'Nueva Venta';
        document.getElementById('codigoVenta').value = '';
        document.getElementById('fechaVenta').value = new Date().toISOString().split('T')[0];
        document.getElementById('detalleVentas').innerHTML = '';
        document.getElementById('totalVenta').textContent = '0.00';
        agregarProducto();
        modal.show();
    }

    function agregarProducto() {
        const div = document.createElement('div');
        div.className = 'detalle-item';
        div.innerHTML = `
                <div class="row">
                    <div class="col-md-5">
                        <select class="form-select form-select-sm producto-select" required onchange="calcularSubtotal(this)">
                            <option value="">Seleccione producto</option>
                            ${productosData.filter(p => p.stock > 0).map(p => `<option value="${p.codigoProducto}" data-precio="${p.precio}">${p.nombreProducto} - Q${p.precio}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control form-control-sm cantidad" placeholder="Cantidad" min="1" required onchange="calcularSubtotal(this)">
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control form-control-sm subtotal" placeholder="Subtotal" readonly>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('.detalle-item').remove(); calcularTotal()">×</button>
                    </div>
                </div>
            `;
        document.getElementById('detalleVentas').appendChild(div);
    }

    function calcularSubtotal(element) {
        const item = element.closest('.detalle-item');
        const select = item.querySelector('.producto-select');
        const cantidad = parseInt(item.querySelector('.cantidad').value) || 0;
        const precio = parseFloat(select.options[select.selectedIndex]?.dataset.precio || 0);
        const subtotal = cantidad * precio;
        item.querySelector('.subtotal').value = subtotal.toFixed(2);
        calcularTotal();
    }

    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.subtotal').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('totalVenta').textContent = total.toFixed(2);
    }

    document.getElementById('formVenta').addEventListener('submit', async (e) => {
        e.preventDefault();
        const detalles = [];
        document.querySelectorAll('.detalle-item').forEach(item => {
            const select = item.querySelector('.producto-select');
            const cantidad = parseInt(item.querySelector('.cantidad').value);
            const precio = parseFloat(select.options[select.selectedIndex]?.dataset.precio);
            const subtotal = parseFloat(item.querySelector('.subtotal').value);
            detalles.push({
                producto: { codigoProducto: parseInt(select.value) },
                cantidad,
                precioUnitario: precio,
                subtotal
            });
        });

        const venta = {
            fechaVenta: document.getElementById('fechaVenta').value,
            total: parseFloat(document.getElementById('totalVenta').textContent),
            estado: 1,
            cliente: { dpiCliente: parseInt(document.getElementById('cliente').value) },
            usuario: { codigoUsuario: 1 },
            detalleVentas: detalles
        };

        await fetch(API_VENTAS, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(venta)
        });

        modal.hide();
        cargarVentas();
    });

    async function verDetalle(id) {
        alert('Ver detalle de venta ' + id);
    }

    async function eliminar(id) {
        if (!confirm('¿Eliminar esta venta?')) return;
        await fetch(`${API_VENTAS}/${id}`, { method: 'DELETE' });
        cargarVentas();
    }
</script>
</body>
</html>
